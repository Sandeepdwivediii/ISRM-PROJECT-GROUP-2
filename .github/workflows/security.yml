name: Security Scan

on:
  push:
  pull_request:

jobs:
  bandit-scan-fixed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: python -m pip install --upgrade pip bandit

      - name: Run Bandit scan for fixed app
        run: bandit -r .
        working-directory: fixed app/isrm project/sms

  bandit-scan-vulnerable:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: python -m pip install --upgrade pip bandit

      - name: Run Bandit scan for vulnerable app
        run: bandit -r .
        working-directory: vulnerable-app/sms
